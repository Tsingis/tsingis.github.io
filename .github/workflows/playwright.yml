name: playwright
on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/package*.json"
      - "tests/**/*.spec.ts"
      - ".github/workflows/playwright.yml"
  workflow_dispatch:
    inputs:
      baseUrl:
        description: "Base URL for tests"
        required: true
        type: choice
        options:
          - "local"
          - "remote"
        default: "local"
  schedule:
    - cron: "0 21 1 * *"
env:
  NO_UPDATE_NOTIFIER: true
jobs:
  playwright:
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
      BASE_URL_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.baseUrl || 'local' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: "tests/package-lock.json"
      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: ./tests
      - name: Cache playwright
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('tests/package-lock.json') }}
      - name: Setup
        run: npm run playwright:setup
        working-directory: ./tests
      - name: Run tests (local)
        if: ${{ env.BASE_URL_MODE == 'local' }}
        run: npm run playwright
        working-directory: ./tests
        env:
          CI: true
      - name: Run tests (remote)
        if: ${{ env.BASE_URL_MODE == 'remote' }}
        run: npm run playwright
        working-directory: ./tests
        env:
          CI: true
          BASE_URL: ${{ vars.URL }}
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: tests/test-results/
          retention-days: 14
